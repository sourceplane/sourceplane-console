name: Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target Cloudflare environment
        default: preview
        required: true
        type: choice
        options:
          - preview
          - production
      workspace:
        description: Deploy a single workspace or auto-discover changes from the selected ref
        default: auto
        required: true
        type: choice
        options:
          - auto
          - api-edge
          - identity-worker
          - web-console
  push:
    branches:
      - main

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
      target_environment: ${{ steps.matrix.outputs.target_environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Resolve deployment matrix
        id: matrix
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            target_environment="${{ inputs.environment }}"
            if [[ "${{ inputs.workspace }}" != "auto" ]]; then
              echo "matrix=[\"${{ inputs.workspace }}\"]" >> "$GITHUB_OUTPUT"
              echo "target_environment=$target_environment" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            default_branch="${{ github.event.repository.default_branch }}"
            git fetch --no-tags origin "$default_branch:refs/remotes/origin/$default_branch"

            if git merge-base --is-ancestor "${{ github.sha }}" "origin/$default_branch"; then
              base_ref=$(git rev-parse "${{ github.sha }}^" 2>/dev/null || printf '')
            else
              base_ref=$(git merge-base "origin/$default_branch" "${{ github.sha }}")
            fi
          else
            target_environment="preview"
            base_ref="${{ github.event.before }}"
          fi

          matrix=$(node tooling/scripts/resolve-changed-apps.mjs "$base_ref" "${{ github.sha }}")
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"
          echo "target_environment=$target_environment" >> "$GITHUB_OUTPUT"

  deploy:
    needs: discover
    if: ${{ needs.discover.outputs.matrix != '[]' }}
    runs-on: ubuntu-latest
    environment: ${{ needs.discover.outputs.target_environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.7.1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          cache: pnpm
          node-version: 22

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Deploy workspaces
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          WORKSPACE_MATRIX: ${{ needs.discover.outputs.matrix }}
          TARGET_ENVIRONMENT: ${{ needs.discover.outputs.target_environment }}
        shell: bash
        run: |
          ordered_workspaces=$(node -e 'const workspaces = JSON.parse(process.env.WORKSPACE_MATRIX); const deployOrder = ["identity-worker", "api-edge", "web-console"]; for (const workspace of deployOrder) { if (workspaces.includes(workspace)) console.log(workspace); }')

          while IFS= read -r workspace; do
            [[ -z "$workspace" ]] && continue
            pnpm --filter "@sourceplane/${workspace}..." build
            pnpm --filter "@sourceplane/${workspace}" deploy -- --env "$TARGET_ENVIRONMENT"
          done <<< "$ordered_workspaces"
