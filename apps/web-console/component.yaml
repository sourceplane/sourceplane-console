apiVersion: sourceplane.io/v1
kind: Component

metadata:
  name: sourceplane-web-console

spec:
  type: cloudflare-pages-turbo
  domain: sourceplane-saas
  subscribe:
    environments:
      - dev
      - staging
      - production
  inputs:
    outputDir: dist
    projectName: sourceplane-web-console
    nodeVersion: "22"
    pnpmVersion: "10.7.1"
    productionBranch: main
  labels:
    team: platform
    layer: runtime
    surface: console
    runtime: cloudflare
