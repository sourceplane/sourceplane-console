apiVersion: sourceplane.io/v1
kind: Component

metadata:
  name: sourceplane-api-edge

spec:
  type: cloudflare-worker-turbo
  domain: sourceplane-saas
  subscribe:
    environments:
      - dev
      - staging
      - production
  inputs:
    nodeVersion: "22"
    pnpmVersion: "10.7.1"
    productionBranch: main
    wranglerConfig: wrangler.jsonc
  labels:
    team: platform
    layer: runtime
    surface: api
    runtime: cloudflare
